<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>地球人共识 · Daily Consensus</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>🌍 地球人共识</h1>
      <p>每天一个「地球人都知道」的事 · 一句话共鸣</p>
    </header>

    <main>
      <section class="topic" id="topic">
        <p class="loading">加载中…</p>
      </section>

      <section class="submit">
        <textarea id="reply-input" placeholder="输入一句最共鸣的话…（100字内）" maxlength="100"></textarea>
        <button id="submit-btn">提交</button>
        <p class="hint">不骂人、不攻击、只共鸣 · 提交即公开</p>
      </section>

      <section class="replies" id="replies">
        <h2>今日神回复（最新）</h2>
        <div id="replies-list">
          <p class="empty">还没人说话… 你来第一句？</p>
        </div>
      </section>
    </main>

    <footer>
      <p>© 2026 地球人共识 · 零门槛 · 无排名 · 只为一起叹口气</p>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
